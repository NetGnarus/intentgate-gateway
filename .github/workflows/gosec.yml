# gosec — Go-specific SAST, complements CodeQL with Go-aware checks.
# Written by scripts/security-rollout.sh.

name: gosec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC, an hour after CodeQL

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec.sarif ./..."

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
