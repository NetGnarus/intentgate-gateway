name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files need 'gofmt -s -w':"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: Build binaries
        run: |
          mkdir -p bin
          go build -trimpath -o bin/gateway ./cmd/gateway
          go build -trimpath -o bin/igctl   ./cmd/igctl

      - name: Smoke test built binary
        run: |
          ./bin/gateway &
          GATEWAY_PID=$!
          # Give it a moment to bind :8080.
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/healthz >/dev/null; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8080/healthz | grep -q '"status":"ok"' \
            || (echo "::error::/healthz did not return ok"; kill $GATEWAY_PID; exit 1)
          kill $GATEWAY_PID
          wait $GATEWAY_PID 2>/dev/null || true

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: intentgate/gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci-${{ github.sha }}

      - name: Run image and probe /healthz
        run: |
          docker run -d --rm --name gw -p 8080:8080 intentgate/gateway:ci
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/healthz >/dev/null; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8080/healthz | grep -q '"status":"ok"' \
            || (echo "::error::container /healthz did not return ok"; docker logs gw; docker stop gw; exit 1)
          docker stop gw
